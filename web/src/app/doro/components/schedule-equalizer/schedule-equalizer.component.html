<div class="eq">
  <div class="eq__track" 
    [class.eq__track--down]="upsideDown" 
    [style.width.px]="trackWidth" 
    [style.transform]="'translateX(' + offsetX + 'px)'">
    @for(ev of events; track ev.id) {
      <div class="eq__bar"
        [style.height.px]="getBarHeight(ev.length)"
        [style.background]="getBarColor(ev)"
      ></div>
    }
  </div>
</div>
