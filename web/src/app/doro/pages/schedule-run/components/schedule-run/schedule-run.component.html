<div class="container">
  <select gui
    [inputs]="{
      label: 'Таймеры',
      options: scheduleMenuItems$,
        value: currentSchedule,
        showEmptyOption: true,
        emptyOptionText: 'Выбрать таймер'
    }"
    [outputs]="{
      valueChange: goToScheduleRun.bind(this)
    }"
  ></select>
  @if (view$ | async; as view) {
    @switch(view.status) {
      @case(ViewStatus.LOADING) {
        <app-loading></app-loading>
      }
      @case(ViewStatus.READY) {
        @if (view.data; as data) {
          @if (data[EVENT_PROPS_KEY]; as eventProps) {
            
            <!-- @if(eventProps.type === eventTypes.TRANSITION) {
              <h1>TRANSITION</h1>
            }
            @else if(eventProps.type === eventTypes.TRANSITION_NEXT) {
              <h1>TRANSITION NEXT</h1>
            } -->
            <!-- @else { -->
              <pre>{{ data | json }}</pre>
              <app-base-event
                [data]="data"
              ></app-base-event>
            <!-- } -->
          }
        }
      }
      @case(ViewStatus.ERROR) {
        <h1>error</h1>
        <pre style="white-space: normal;">{{view.error}}</pre>
        <button gui type="button"
          [inputs]="{
            label: 'Удалить таймер ' + scheduleId,
          }"
          [outputs]="{click: deleteCurrentSchedule.bind(this)}"
        ></button>
      }
    }
  }
</div>
