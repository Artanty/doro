@if (eventState) {
  <app-timer 
    [length]="eventState?.len ?? 0"
    [time]="eventState?.cur ?? 0"
    [eventType]="eventProps.is_rest ? 2 : 1"
    [maxWidth]="400"
    [scheduleEvents]="scheduleEventsForTimer.events"
    [activeEventId]="scheduleEventsForTimer.activeEventId"
  >
  </app-timer>

  <ng-container [ngTemplateOutlet]="bottomControlsRow"></ng-container>

  <ng-template #bottomControlsRow>
    <div class="bottomControlsRow">
      <!-- <button gui
        type="button" 
        [inputs]="{
          icon: 'mu mu-replay',
          color: 'rgb(83 105 118 / 52%)'
        }"
        [outputs]="{click: finishTransitionAndDuplicateEvent.bind(this, view.data!)}"
      >
        Повторить
      </button> -->
      
      @if (eventState.stt !== EventStates.PLAYING) {
        <button gui
          type="button" 
          [inputs]="{
            icon: 'mu mu-play',
            color: 'rgb(88 83 118 / 52%)'
          }"
          [outputs]="{click: playEvent.bind(this)}"
        >
          Начать
        </button>
      } 
      @else {
        <button gui
          type="button" 
          [inputs]="{
            icon: 'mu mu-pause',
            color: 'rgb(88 83 118 / 52%)'
          }"
          [outputs]="{click: pauseEvent.bind(this)}"
        >
          Пауза
        </button>
      }
      
      @if (scheduleState !== 'TRANSITION' && nextEvent) {
        <button gui
          type="button" 
          [inputs]="{
            icon: 'mu mu-next',
            color: 'rgb(175 84 84 / 52%)'
          }"
          [outputs]="{click: endEvent.bind(this)}"
        >
          Следующее
        </button>
      }
    </div>
  </ng-template>
}
