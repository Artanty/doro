<li>
  <div class="info" (click)="goToSchedule()">
    <span class="name">{{ schedule.name }}</span>
    <span class="meta">{{ schedule.created_at }}</span>
  </div>
  <div class="action">
    <div gui type="dropdown"
      [inputs]="{
        buttonIcon: 'mu mu-opts-v',
        items: menuItems
      }"
      [outputs]="{
        itemSelected: deleteSchedule.bind(this)
      }"
    ></div>
  </div>
</li>
